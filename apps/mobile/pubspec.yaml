name: xiangqi_solver
description: "Android Xiangqi solver — captures the board, analyzes it via a backend, and overlays the best move."
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Localization (gen_l10n) — generates AppLocalizations from lib/l10n/*.arb.
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (no codegen).
  flutter_riverpod: ^2.6.1

  # Routing.
  go_router: ^14.6.2

  # Networking.
  dio: ^5.7.0

  # Local persistence.
  shared_preferences: ^2.3.3

  # Secure storage for the user's own API key (on-device / BYO-key mode).
  flutter_secure_storage: ^9.2.4

  # Stable per-device id that survives uninstall/reinstall (MediaDrm on Android),
  # used for the install-grant flow so the free hints can't be farmed by
  # reinstalling. Falls back to a persisted random id when unavailable.
  persistent_device_id: ^1.1.0

  # Platform / file utilities.
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

  # Value equality for immutable models.
  equatable: ^2.0.7

  # Open external links (privacy policy).
  url_launcher: ^6.3.2

  # Formatting (timestamps, etc.).
  intl: ^0.20.1

  # Monetization (hint wallet): rewarded ads + in-app purchases.
  google_mobile_ads: ^8.0.0
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Generate AppLocalizations from the ARB files (see l10n.yaml).
  generate: true

  # NOTE: the on-device engine (Pikafish .so + NNUE) is NOT a Flutter asset and
  # is NOT bundled in release builds — it's GPLv3 + a non-commercial net, so it
  # must stay out of the commercial app. It ships only in DEBUG via
  # android/app/src/debug/jniLibs/ (libpikafish.so + libpikafish_nnue.so),
  # extracted to nativeLibraryDir. See docs/ON_DEVICE_ENGINE.md.
