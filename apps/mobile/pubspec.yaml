name: xiangqi_solver
description: "Android Xiangqi solver — captures the board, analyzes it via a backend, and overlays the best move."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (no codegen).
  flutter_riverpod: ^2.6.1

  # Routing.
  go_router: ^14.6.2

  # Networking.
  dio: ^5.7.0

  # Local persistence.
  shared_preferences: ^2.3.3

  # Platform / file utilities.
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

  # Value equality for immutable models.
  equatable: ^2.0.7

  # Formatting (timestamps, etc.).
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
