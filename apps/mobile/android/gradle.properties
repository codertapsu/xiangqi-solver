org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Some third-party plugins (e.g. receive_sharing_intent, used iOS-side only)
# compile Java at target 11 but Kotlin at the JDK-21 default, which modern Kotlin
# rejects as an "Inconsistent JVM-target". Demote that strict check to a warning:
# Android's D8/R8 dexes mixed class-file versions fine, so this is safe.
kotlin.jvm.target.validation.mode=warning
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
